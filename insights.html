<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<title>The Joneses — Insights</title>
<style>
  :root { --bg:#0f1116; --panel:#1a1d24; --panel-2:#232730; --text:#e8eaed; --muted:#9aa0a6; --accent:#4eccc6; --border:#2a2e36; --success:#00c875; --warning:#fdab3d; --danger:#df2f4a; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
  header { padding:24px 40px 16px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  h1 { font-size:24px; margin:0; font-weight:600; }
  .subtitle { color:var(--muted); font-size:12px; }
  .tabs { display:flex; gap:4px; flex-wrap:wrap; }
  .tab { padding:7px 14px; cursor:pointer; border-radius:7px; font-size:13px; color:var(--muted); }
  .tab:hover { color:var(--text); }
  .tab.active { background:var(--accent); color:#000; font-weight:600; }
  main { padding:26px 40px; max-width:1400px; margin:0 auto; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; margin-bottom:18px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .card.wide { grid-column:span 2; }
  .card h2 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin:0 0 14px; font-weight:600; }
  .stat-big { font-size:40px; font-weight:600; line-height:1; }
  .stat-label { color:var(--muted); font-size:13px; margin-top:4px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:7px 8px 7px 0; color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
  td { padding:9px 8px 9px 0; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  .avatar { width:32px; height:32px; border-radius:50%; background:var(--panel-2); display:inline-flex; align-items:center; justify-content:center; font-size:16px; vertical-align:middle; margin-right:8px; overflow:hidden; flex-shrink:0; }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  .pill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:500; }
  .chart-row { display:flex; align-items:center; padding:5px 0; font-size:13px; gap:10px; }
  .chart-label { min-width:200px; }
  .chart-bar { flex:1; height:16px; background:var(--panel-2); border-radius:4px; overflow:hidden; }
  .chart-bar-fill { height:100%; border-radius:4px; }
  .chart-value { min-width:40px; text-align:right; color:var(--muted); }
  .legend-dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; }
  .progress { height:6px; background:var(--panel-2); border-radius:3px; overflow:hidden; margin-top:8px; }
  .progress-fill { height:100%; }
  .quick-links { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; }
  .quick-link { background:var(--panel-2); border:1px solid var(--border); padding:12px; border-radius:8px; text-align:center; display:block; transition:border-color .15s; }
  .quick-link:hover { border-color:var(--accent); }
  .quick-link-name { font-weight:600; font-size:13px; margin-bottom:3px; }
  .quick-link-meta { font-size:11px; color:var(--muted); }
  a { color:var(--accent); text-decoration:none; }
  .empty { color:var(--muted); text-align:center; padding:28px 0; font-size:13px; line-height:1.7; }
  .bday-row { display:flex; align-items:center; padding:5px 0; font-size:13px; gap:8px; }
  .bday-day { min-width:32px; font-size:18px; font-weight:600; color:var(--accent); }
  .bday-soon { background:var(--danger); color:#fff; font-size:10px; padding:1px 7px; border-radius:99px; margin-left:6px; }
  .stamp { font-size:11px; color:var(--muted); }
  code { background:var(--panel-2); padding:1px 5px; border-radius:3px; font-size:11px; }
  .row-link { cursor:pointer; }
  .row-link:hover { color:var(--accent); }
  /* ── Interactive card drawer + editors ── */
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--panel-2); border:1px solid var(--border); color:var(--text); padding:9px 16px; border-radius:8px; font-size:13px; z-index:400; opacity:0; transition:opacity .2s; pointer-events:none; box-shadow:0 6px 24px rgba(0,0,0,.45); }
  .toast.show { opacity:1; } .toast.err { border-color:var(--danger); color:#ff8a9c; }
  .picker-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:300; display:flex; align-items:center; justify-content:center; }
  .picker { width:380px; max-width:92vw; max-height:74vh; background:var(--panel); border:1px solid var(--border); border-radius:12px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.6); }
  .picker-head { padding:14px 16px 10px; border-bottom:1px solid var(--border); } .picker-head h3 { margin:0 0 8px; font-size:14px; }
  .picker-head input, .picker-head select, .picker-head textarea { width:100%; padding:8px 10px; background:var(--panel-2); color:var(--text); border:1px solid var(--border); border-radius:6px; font-size:13px; }
  .picker-list { overflow-y:auto; padding:6px; } .picker-item { display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:7px; cursor:pointer; font-size:13px; }
  .picker-item:hover { background:var(--panel-2); } .picker-item .pi-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; } .picker-item .pi-sub { color:var(--muted); font-size:11px; margin-left:auto; }
  .picker-foot { padding:8px 14px; border-top:1px solid var(--border); text-align:right; }
  .btn-add { background:none; border:1px solid var(--border); color:var(--muted); min-width:20px; height:20px; line-height:1; border-radius:5px; cursor:pointer; font-size:13px; padding:0 4px; }
  .btn-add:hover { color:var(--accent); border-color:var(--accent); }
  .edit-link { color:var(--muted); cursor:pointer; font-size:11px; border:1px dashed var(--border); border-radius:5px; padding:1px 6px; margin-left:6px; } .edit-link:hover { color:var(--accent); border-color:var(--accent); }
  .chip-x { margin-left:5px; opacity:.5; cursor:pointer; font-weight:700; } .chip-x:hover { opacity:1; color:#ff8a9c; }
  .drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:90; }
  .card-drawer { position:fixed; top:0; right:0; width:392px; max-width:94vw; height:100vh; background:var(--panel); border-left:1px solid var(--border); z-index:100; overflow-y:auto; padding:18px; box-shadow:-12px 0 40px rgba(0,0,0,.45); }
  .card-drawer .x-close { position:absolute; top:12px; right:14px; cursor:pointer; color:var(--muted); font-size:20px; }
  .card-drawer .x-close:hover { color:var(--text); }
  .info-photo { width:100%; aspect-ratio:1; border-radius:12px; background:var(--panel-2); border:1px solid var(--border); margin-bottom:6px; display:flex; align-items:center; justify-content:center; font-size:64px; color:var(--muted); overflow:hidden; }
  .info-photo img { width:100%; height:100%; object-fit:cover; }
  .info-name { font-size:20px; font-weight:600; margin-bottom:4px; } .info-meta { color:var(--muted); font-size:13px; margin-bottom:6px; }
  .info-tags { display:flex; flex-wrap:wrap; gap:5px; margin:6px 0 12px; }
  .info-tag { background:var(--panel-2); padding:2px 9px; border-radius:999px; font-size:11px; border:1px solid var(--border); }
  .info-section { margin-bottom:12px; padding-top:10px; border-top:1px solid var(--border); }
  .info-section h3 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin:0 0 6px; }
  .info-list { list-style:none; padding:0; margin:0; font-size:13px; } .info-list li { padding:3px 0; cursor:pointer; } .info-list li:hover { color:var(--accent); }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
  <div>
    <h1>The Joneses — Insights</h1>
    <div class="subtitle" id="subtitle"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="overview">Overview</div>
      <div class="tab" data-tab="calendar">Birthdays</div>
      <div class="tab" data-tab="anniversaries">Anniversaries</div>
      <div class="tab" data-tab="health">All People</div>
      <div class="tab" data-tab="circles">Circles</div>
    </div>
    <button id="refresh-btn" class="tab" style="border:1px solid var(--border)">↻ Refresh from Monday</button>
    <span class="stamp" id="stamp"></span>
  </div>
</header>

<main id="content"></main>
<div id="card-root"></div>

<script>
// ── DATA (regenerated 2026-06-28 18:34) ──────────────────────────────
const GENERATED_AT = "2026-06-28 18:34";
const PEOPLE = [];
// ── END DATA ─────────────────────────────────────────────────────────

// ── CONFIG ───────────────────────────────────────────────────────────
const CONTACTS_BOARD = 18408024949;

const CIRCLE_DEFS = [
  {id:"12145324147",label:"Inner Circle",        colour:"#df2f4a"},
  {id:"12145344671",label:"Steve's Circle",      colour:"#a25ddc"},
  {id:"12208250357",label:"Club of Gentlemen",   colour:"#ffcb00"},
  {id:"12208357512",label:"Pat Coyne's Circle",  colour:"#ff7575"},
  {id:"12145330009",label:"School Parents",      colour:"#fdab3d"},
  {id:"12145417298",label:"Parish — Opus Dei",   colour:"#225091"},
  {id:"12145329931",label:"Southeast Neighbours",colour:"#4eccc6"},
  {id:"12147767023",label:"PARED Football",      colour:"#037f4c"},
  {id:"12147609836",label:"Comrades",            colour:"#9cd326"},
  {id:"12147640823",label:"Friends of Drummond", colour:"#ff158a"},
  {id:"12147622252",label:"Order of Malta",      colour:"#bb3354"},
  {id:"12147753459",label:"HHC",                 colour:"#7e5bef"},
  {id:"12147640824",label:"Argentinos AU",       colour:"#66ccff"},
  {id:"12145329984",label:"August Family",       colour:"#faa1f1"},
  {id:"12208215560",label:"Parsons-Aubone Family",colour:"#e84a8a"},
  {id:"12145324149",label:"Waste Stream",        colour:"#9aa0a6"},
  {id:"12389760806",label:"Cinthia · Inner Circle",colour:"#ff66b3"},
  {id:"12389629873",label:"Santiago · Inner Circle",colour:"#3399ff"},
  {id:"12389622774",label:"Sophia · Friends",     colour:"#ff8a5c"},
  {id:"12389629503",label:"Augusto · Friends",    colour:"#7bd88f"},
  {id:"12389629614",label:"Ian · Friends",        colour:"#ba8cff"},
];

const TODAY = (()=>{ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); })();
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

// ── HELPERS ───────────────────────────────────────────────────────────
function avatar(p) {
  return `<div class="avatar">${p.photo?`<img src="${p.photo}" alt="" onerror="this.parentNode.innerHTML='👤'">`:"👤"}</div>`;
}
function tierColour(t){return t===5?"#df2f4a":t===15?"#fdab3d":t===50?"#4eccc6":"#579bfc";}

function barChart(rows,maxVal){
  const m=maxVal||Math.max(...rows.map(r=>r.val),1);
  return rows.map(r=>`<div class="chart-row">
    <div class="chart-label"><span class="legend-dot" style="background:${r.colour}"></span>${r.label}</div>
    <div class="chart-bar"><div class="chart-bar-fill" style="width:${r.val/m*100}%;background:${r.colour}"></div></div>
    <div class="chart-value">${r.val}</div>
  </div>`).join("");
}

function getFamilyTree(p){
  const byId=Object.fromEntries(PEOPLE.map(x=>[x.id,x]));
  const uniq=arr=>[...new Map(arr.filter(Boolean).map(x=>[x.id,x])).values()];
  const up=ids=>ids.map(id=>byId[id]).filter(Boolean);
  const parents=uniq(up(p.parentIds));
  const grandparents=uniq(parents.flatMap(x=>up(x.parentIds)));
  const children=PEOPLE.filter(x=>x.parentIds.includes(p.id));
  const grandchildren=uniq(children.flatMap(c=>PEOPLE.filter(x=>x.parentIds.includes(c.id))));
  return {parents,grandparents,children,grandchildren};
}

// ── TABS ──────────────────────────────────────────────────────────────
function renderOverview(){
  const total=PEOPLE.length;
  const households=new Set(PEOPLE.map(p=>p.householdId).filter(Boolean)).size;
  const inner=PEOPLE.filter(p=>p.closeness.tier===5).length;
  const sympathy=PEOPLE.filter(p=>p.closeness.tier===15).length;
  const active=PEOPLE.filter(p=>p.closeness.tier===50).length;
  const extended=PEOPLE.filter(p=>p.closeness.tier===150).length;
  const withPhoto=PEOPLE.filter(p=>p.photo).length;
  const withBday=PEOPLE.filter(p=>p.birthday).length;
  const withAnn=PEOPLE.filter(p=>p.anniversary).length;
  const pct=Math.round(withPhoto/total*100)||0;
  const circleRows=CIRCLE_DEFS.map(c=>({label:c.label,colour:c.colour,val:PEOPLE.filter(p=>p.circleIds.includes(c.id)).length})).filter(r=>r.val>0).sort((a,b)=>b.val-a.val);
  const bigFamilies=Object.entries(PEOPLE.filter(p=>p.householdId).reduce((acc,p)=>{(acc[p.householdId]||=[]).push(p);return acc;},{})).map(([,m])=>m).sort((a,b)=>b.length-a.length).slice(0,10);

  document.getElementById("content").innerHTML=`
  <div class="grid">
    <div class="card"><h2>Souls in the network</h2><div class="stat-big">${total}</div><div class="stat-label">${households} households · ${circleRows.length} circles</div></div>
    <div class="card"><h2>Inner Circle</h2><div class="stat-big" style="color:var(--danger)">${inner}</div><div class="stat-label">Dunbar's dearest five</div></div>
    <div class="card"><h2>Sympathy Group</h2><div class="stat-big" style="color:var(--warning)">${sympathy}</div><div class="stat-label">People you'd ring on a bad day</div></div>
    <div class="card"><h2>Active Network</h2><div class="stat-big" style="color:var(--accent)">${active}</div><div class="stat-label">Neighbours, school, parish</div></div>
    <div class="card wide"><h2>Dunbar's tiers</h2>${barChart([{label:"Inner Circle (5)",val:inner,colour:"#df2f4a"},{label:"Sympathy Group (15)",val:sympathy,colour:"#fdab3d"},{label:"Active Network (50)",val:active,colour:"#4eccc6"},{label:"Extended (150)",val:extended,colour:"#579bfc"}],150)}</div>
    <div class="card"><h2>Profile completeness</h2><div class="stat-big">${pct}<span style="font-size:20px;color:var(--muted)">%</span></div><div class="stat-label">${withPhoto} photos · ${withBday} birthdays · ${withAnn} anniversaries</div><div class="progress"><div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div></div></div>
  </div>
  <div class="grid">
    <div class="card wide"><h2 class="row-link" data-gototab="circles" title="Open the editable Circles tab">Circles by membership ›</h2>${barChart(circleRows)}</div>
    <div class="card"><h2>Quick links</h2><div class="quick-links">
      <a class="quick-link" href="https://rezet-global.monday.com/boards/18408024949" target="_blank"><div class="quick-link-name">TJ Contacts</div><div class="quick-link-meta">${total} people</div></a>
      <a class="quick-link" href="https://rezet-global.monday.com/boards/18415541970" target="_blank"><div class="quick-link-name">TJ Circles</div><div class="quick-link-meta">${circleRows.length} circles</div></a>
      <a class="quick-link" href="https://rezet-global.monday.com/boards/18415541971" target="_blank"><div class="quick-link-name">TJ Interactions</div><div class="quick-link-meta">Encounters log</div></a>
      <a class="quick-link" href="https://rezet-global.monday.com/boards/18415541972" target="_blank"><div class="quick-link-name">TJ Families</div><div class="quick-link-meta">${households} households</div></a>
      <a class="quick-link" href="https://rezet-global.monday.com/boards/18415541973" target="_blank"><div class="quick-link-name">TJ Occasions</div><div class="quick-link-meta">Events & gifts</div></a>
    </div></div>
  </div>
  <div class="grid">
    <div class="card wide"><h2>Largest households</h2><table><thead><tr><th>Family</th><th>Members</th><th>Circle</th></tr></thead><tbody>
      ${bigFamilies.map(m=>`<tr><td><strong class="row-link" data-pid="${m[0].id}">${m[0].household}</strong></td><td>${m.length} — ${m.map(x=>`<span class="row-link" data-pid="${x.id}">${x.name.split(" ").slice(-1)[0]}</span>`).join(", ")}</td><td><span class="pill" style="background:${m[0].circle.colour}22;color:${m[0].circle.colour}">${m[0].circle.label}</span></td></tr>`).join("")}
    </tbody></table></div>
  </div>`;
}

function renderCalendar(){
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const withBday=PEOPLE.filter(p=>p.birthday);
  if(!withBday.length){
    document.getElementById("content").innerHTML=`<div class="card"><h2>Upcoming birthdays</h2><div class="empty">No birthdays recorded yet.<br><br>Open <a href="https://rezet-global.monday.com/boards/${CONTACTS_BOARD}" target="_blank">TJ Contacts</a> and fill in the <strong>BirthDay</strong> column.<br>Then regenerate these files.</div></div>`;
    return;
  }
  const byMonth={};
  for(let i=0;i<=12;i++){const d=new Date(TODAY);d.setMonth(d.getMonth()+i);byMonth[`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`]=[];}
  withBday.forEach(p=>{
    const[,mm,dd]=p.birthday.split("-");
    const a=new Date(`2026-${mm}-${dd}`),b=new Date(`2027-${mm}-${dd}`);
    const next=a>=TODAY?a:b;
    const key=`${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,"0")}`;
    if(byMonth[key]!==undefined)byMonth[key].push({...p,nextBday:next,day:parseInt(dd)});
  });
  const html=Object.entries(byMonth).filter(([,ppl])=>ppl.length).map(([key,ppl])=>{
    const[y,m]=key.split("-");
    return`<div class="card"><h2>${months[parseInt(m)-1]} ${y}</h2>${ppl.sort((a,b)=>a.day-b.day).map(p=>{
      const days=Math.ceil((p.nextBday-TODAY)/86400000);
      return`<div class="bday-row">${avatar(p)}<div><div style="font-weight:600"><span class="row-link" data-pid="${p.id}">${p.name}</span>${days<=14?`<span class="bday-soon">in ${days}d</span>`:""}</div><div style="font-size:11px;color:var(--muted)">${p.day} ${months[parseInt(m)-1]} · ${p.circle.label}</div></div></div>`;
    }).join("")}</div>`;
  }).join("");
  document.getElementById("content").innerHTML=`<div class="grid">${html}</div>`;
}

function renderAnniversaries(){
  const withAnn=PEOPLE.filter(p=>p.anniversary);
  if(!withAnn.length){
    document.getElementById("content").innerHTML=`<div class="card"><h2>Anniversaries</h2><div class="empty">No anniversaries recorded yet.<br><br>Fill the <strong>Anniversary</strong> column in <a href="https://rezet-global.monday.com/boards/${CONTACTS_BOARD}" target="_blank">TJ Contacts</a>, then regenerate.</div></div>`;
    return;
  }
  // Dedupe couples: if two partners share the same anniversary date, show once as a pair.
  const seen=new Set(), entries=[];
  const byId=Object.fromEntries(PEOPLE.map(p=>[p.id,p]));
  withAnn.forEach(p=>{
    if(seen.has(p.id))return;
    const partner=p.partnerId?byId[p.partnerId]:null;
    let label=p.name;
    if(partner && partner.anniversary===p.anniversary){ seen.add(partner.id); label=`${p.name.split(" ").slice(-1)[0]} & ${partner.name.split(" ").slice(-1)[0]} ${p.name.split(" ")[0]}`; }
    seen.add(p.id);
    entries.push({...p, _label:label});
  });
  const byMonth={};
  for(let i=0;i<=12;i++){const d=new Date(TODAY);d.setMonth(d.getMonth()+i);byMonth[`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`]=[];}
  entries.forEach(p=>{
    const[yy,mm,dd]=p.anniversary.split("-");
    const a=new Date(`${TODAY.getFullYear()}-${mm}-${dd}`),b=new Date(`${TODAY.getFullYear()+1}-${mm}-${dd}`);
    const next=a>=TODAY?a:b;
    const key=`${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,"0")}`;
    const yrs=(parseInt(yy) && parseInt(yy)<TODAY.getFullYear())? next.getFullYear()-parseInt(yy) : null;
    if(byMonth[key]!==undefined)byMonth[key].push({...p,nextAnn:next,day:parseInt(dd),yrs});
  });
  const html=Object.entries(byMonth).filter(([,ppl])=>ppl.length).map(([key,ppl])=>{
    const[y,m]=key.split("-");
    return`<div class="card"><h2>${MONTHS[parseInt(m)-1]} ${y}</h2>${ppl.sort((a,b)=>a.day-b.day).map(p=>{
      const days=Math.ceil((p.nextAnn-TODAY)/86400000);
      return`<div class="bday-row">${avatar(p)}<div><div style="font-weight:600">💍 <span class="row-link" data-pid="${p.id}">${p._label}</span>${p.yrs!=null?` <span style="color:var(--accent);font-size:11px">${p.yrs} yrs</span>`:""}${days<=14?`<span class="bday-soon">in ${days}d</span>`:""}</div><div style="font-size:11px;color:var(--muted)">${p.day} ${MONTHS[parseInt(m)-1]} · ${p.circle.label}</div></div></div>`;
    }).join("")}</div>`;
  }).join("");
  document.getElementById("content").innerHTML=`<div class="grid">${html}</div>`;
}

function renderHealth(){
  const sorted=[...PEOPLE].sort((a,b)=>a.closeness.tier-b.closeness.tier);
  function familyCell(p){
    const t=getFamilyTree(p),parts=[];
    if(t.grandparents.length)parts.push(`<span style="color:var(--muted)">👴 ${t.grandparents.map(x=>x.name.split(" ").slice(-1)[0]).join(", ")}</span>`);

function m2sVal(v){
  if(typeof v==="string") return v||null;
  if(v && typeof v==="object"){
    if(Object.keys(v).length===0) return null;
    if(v.date!==undefined) return v.date||null;
    if(v.text!==undefined) return v.text||null;
    if(v.label!==undefined) return v.label||null;

  }
  return v==null?null:v;
}

async function mondayWrite(itemId, columnValues){
  const patch={};
  for(const [cid,val] of Object.entries(columnValues)){
    const col=M2S[cid]; if(!col) continue;
    if(col==="__closeness__"){ const lbl=(val&&val.label)||null; const m=(lbl||"").match(/\((\d+)\)/);
      patch.closeness_label=lbl?lbl.split(" (")[0]:null; patch.closeness_tier=m?parseInt(m[1]):null; }
    else if(col==="age"){ const x=m2sVal(val); patch.age=(x!==null&&x!=="")?parseInt(x):null; }
    else if(col==="name"){ patch.name=val; }
    else patch[col]=m2sVal(val);
  }
  await sbPatch("contacts","id",itemId,patch); return {id:itemId};
}

function openCrop(person,file){
  const FRAME=280, OUT=480; const img=new Image();
  img.onload=()=>{
    const minScale=FRAME/Math.min(img.naturalWidth,img.naturalHeight);
    let scale=minScale, tx=(FRAME-img.naturalWidth*scale)/2, ty=(FRAME-img.naturalHeight*scale)/2;
    const ov=document.createElement("div"); ov.className="picker-overlay";
    ov.innerHTML=`<div class="picker" style="width:320px"><div class="picker-head"><h3>Position the face — ${person.name}</h3></div>
      <div style="padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px">
        <div id="crop-frame" style="width:${FRAME}px;height:${FRAME}px;border-radius:12px;overflow:hidden;position:relative;background:#000;cursor:grab;touch-action:none">
          <img id="crop-img" src="${img.src}" draggable="false" style="position:absolute;left:0;top:0;transform-origin:0 0;user-select:none;-webkit-user-drag:none">
          <div style="position:absolute;inset:0;pointer-events:none;border:2px dashed rgba(255,255,255,.4);border-radius:12px"></div>
        </div>
        <input id="crop-zoom" type="range" min="1" max="4" step="0.01" value="1" style="width:100%">
        <div style="font-size:11px;color:var(--muted)">Drag to move · slider to zoom</div>
      </div>
      <div class="picker-foot"><button class="tab" id="crop-cancel">Cancel</button> <button class="tab" id="crop-save" style="border:1px solid var(--accent);color:var(--accent)">Save photo</button></div></div>`;
    document.body.appendChild(ov);
    const el=ov.querySelector("#crop-img"), frame=ov.querySelector("#crop-frame"), zoom=ov.querySelector("#crop-zoom");
    function clamp(){ const w=img.naturalWidth*scale, h=img.naturalHeight*scale; if(tx>0)tx=0; if(ty>0)ty=0; if(tx<FRAME-w)tx=FRAME-w; if(ty<FRAME-h)ty=FRAME-h; }
    function apply(){ el.style.width=(img.naturalWidth*scale)+"px"; el.style.height=(img.naturalHeight*scale)+"px"; el.style.transform=`translate(${tx}px,${ty}px)`; }
    clamp(); apply();
    let dragging=false, lx=0, ly=0;
    frame.addEventListener("pointerdown",e=>{dragging=true;lx=e.clientX;ly=e.clientY;frame.setPointerCapture(e.pointerId);frame.style.cursor="grabbing";});
    frame.addEventListener("pointermove",e=>{ if(!dragging)return; tx+=e.clientX-lx; ty+=e.clientY-ly; lx=e.clientX; ly=e.clientY; clamp(); apply(); });
    frame.addEventListener("pointerup",()=>{dragging=false;frame.style.cursor="grab";});
    zoom.addEventListener("input",()=>{ const ns=minScale*parseFloat(zoom.value), cx=FRAME/2, cy=FRAME/2; tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale); scale=ns; clamp(); apply(); });
    ov.querySelector("#crop-cancel").addEventListener("click",()=>ov.remove());
    ov.querySelector("#crop-save").addEventListener("click",()=>{
      const c=document.createElement("canvas"); c.width=OUT; c.height=OUT; const ctx=c.getContext("2d");
      ctx.drawImage(img, -tx/scale, -ty/scale, FRAME/scale, FRAME/scale, 0, 0, OUT, OUT);
      c.toBlob(blob=>{ ov.remove(); if(blob) uploadPhoto(person, blob, (file.name||"photo").replace(/\.[^.]+$/,"")+".jpg"); }, "image/jpeg", 0.9);
    });
    ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
  };
  img.onerror=()=>toast("Couldn't read that image",true);
  img.src=URL.createObjectURL(file);
}
async function uploadPhoto(person,fileOrBlob,filename){
  toast("Uploading photo…");
  const isPng=(filename||"").toLowerCase().endsWith(".png")||(fileOrBlob.type==="image/png");
  const path=`${person.id}-${Date.now()}.${isPng?"png":"jpg"}`;
  try{
    const r=await fetch(`${SUPA.url}/storage/v1/object/photos/${path}`,{method:"POST",
      headers:{apikey:SUPA.key,Authorization:"Bearer "+(AUTH_TOKEN||SUPA.key),"Content-Type":fileOrBlob.type||"image/jpeg","x-upsert":"true"},
      body:fileOrBlob});
    if(!r.ok) throw new Error("storage "+(await r.text()));
    const url=`${SUPA.url}/storage/v1/object/public/photos/${path}`;
    await sbPatch("contacts","id",person.id,{photo_url:url});
    person.photo=url; toast("Photo saved ✓"); afterEdit(person);
  }catch(err){ try{ person.photo=URL.createObjectURL(fileOrBlob); afterEdit(person); }catch(e){} toast("Photo upload failed",true); console.warn(err); }
}

  const opts=STATUS_OPTS[columnId]||[]; const curFull=opts.find(o=>o===cur||o.split(" (")[0]===cur)||"";
  const ov=document.createElement("div"); ov.className="picker-overlay";
  ov.innerHTML=`<div class="picker" style="width:320px"><div class="picker-head"><h3>${label} — ${person.name}</h3><select id="st-in"><option value="">—</option>${opts.map(o=>`<option value="${esc(o)}" ${o===curFull?"selected":""}>${o}</option>`).join("")}</select></div><div class="picker-foot"><button class="tab" id="st-cancel">Cancel</button> <button class="tab" id="st-save" style="border:1px solid var(--accent);color:var(--accent)">Save</button></div></div>`;
  document.body.appendChild(ov);
  ov.querySelector("#st-save").addEventListener("click",async()=>{const v=ov.querySelector("#st-in").value;ov.remove();await setStatus(person,columnId,fkey,v||null);});
  ov.querySelector("#st-cancel").addEventListener("click",()=>ov.remove()); ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
}
async function setNumber(person,columnId,value){
  try{ await mondayWrite(person.id,{[columnId]:(value!==""&&value!=null)?String(value):""}); if(columnId==="numeric_mm3wz3fb")person.age=(value!==""&&value!=null)?parseInt(value):null; toast("Saved ✓"); afterEdit(person); }
  catch(err){ toast("Couldn't save",true); console.warn(err); }
}
function editNumber(person,columnId,label){
  const cur = columnId==="numeric_mm3wz3fb" ? (person.age??"") : "";
  const ov=document.createElement("div"); ov.className="picker-overlay";
  ov.innerHTML=`<div class="picker" style="width:300px"><div class="picker-head"><h3>${label} — ${person.name}</h3><input id="num-in" type="number" value="${cur}" style="${_IN}"></div><div class="picker-foot"><button class="tab" id="num-clear" style="float:left">Clear</button><button class="tab" id="num-cancel">Cancel</button> <button class="tab" id="num-save" style="border:1px solid var(--accent);color:var(--accent)">Save</button></div></div>`;

  ov.querySelector("#num-clear").addEventListener("click",async()=>{ov.remove();await setNumber(person,columnId,"");});

}
async function setContact(person,kind,value){
  const v=(value||"").trim(), col=kind==="phone"?"phone":"email";
  const val = kind==="phone" ? (v?{phone:v,countryShortName:"AU"}:{}) : (v?{email:v,text:v}:{});
  try{ await mondayWrite(person.id,{[col]:val}); person[kind]=v||null; toast("Saved ✓"); afterEdit(person); }
  catch(err){ toast("Couldn't save",true); console.warn(err); }
}

let _families=null;
async function fetchFamilies(){ if(_families)return _families; _families=await sbGet("families?select=id,name&order=name"); return _families; }
async function setHousehold(person,familyId,familyName){
  try{ await sbPatch("contacts","id",person.id,{household_id: familyId?Number(familyId):null}); person.householdId=familyId?Number(familyId):null; person.household=familyName||null; toast("Saved ✓"); afterEdit(person); }
  catch(err){ toast("Couldn't save",true); console.warn(err); }
}
async function editHousehold(person){
  toast("Loading households…");
  let fams; try{ fams=await fetchFamilies(); }catch(err){ toast("Couldn't load households",true); console.warn(err); return; }
  const ov=document.createElement("div"); ov.className="picker-overlay";
  ov.innerHTML=`<div class="picker"><div class="picker-head"><h3>Household for ${person.name}</h3><input type="search" placeholder="Filter, or type a new family name…" id="hh-s"></div><div class="picker-list" id="hh-l"></div><div class="picker-foot"><button class="tab" id="hh-none" style="float:left">No household</button><button class="tab" id="hh-x">Close</button></div></div>`;
  document.body.appendChild(ov);
  const l=ov.querySelector("#hh-l"), s=ov.querySelector("#hh-s");
  function draw(q){ const qt=q.trim();
    const f=qt?fams.filter(x=>x.name.toLowerCase().includes(qt.toLowerCase())):fams;
    let html=f.map(x=>`<div class="picker-item" data-fid="${x.id}" data-fname="${esc(x.name)}"><span class="pi-dot" style="background:#fdab3d"></span><span>${x.name}</span></div>`).join("");
    const exact=fams.some(x=>x.name.toLowerCase()===qt.toLowerCase());
    if(qt&&!exact) html+=`<div class="picker-item" data-newfam="${esc(qt)}"><span class="pi-dot" style="background:var(--accent)"></span><span>＋ Create household "<strong>${esc(qt)}</strong>"</span></div>`;
    l.innerHTML=html||`<div style="padding:14px;color:var(--muted)">Type a family name to create it.</div>`;
    l.querySelectorAll("[data-fid]").forEach(it=>it.addEventListener("click",async()=>{ov.remove();await setHousehold(person,it.dataset.fid,it.dataset.fname);}));
    const nf=l.querySelector("[data-newfam]");
    if(nf) nf.addEventListener("click",async()=>{ ov.remove(); try{ const id=Date.now(); await sbInsert("families",[{id,name:nf.dataset.newfam}]); _families.push({id,name:nf.dataset.newfam}); await setHousehold(person,id,nf.dataset.newfam); }catch(err){ toast("Couldn't create household",true); console.warn(err);} });
  }
  s.addEventListener("input",()=>draw(s.value)); ov.querySelector("#hh-x").addEventListener("click",()=>ov.remove());
  ov.querySelector("#hh-none").addEventListener("click",async()=>{ov.remove();await setHousehold(person,null,null);});
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();}); draw(""); s.focus();
}

const _GOOGLE_SVG='<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 7l7.1 5.5c4.2-3.9 6.6-9.6 6.6-16.5z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.2.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.1-5.5c-2 1.3-4.5 2.1-7.9 2.1-6.3 0-11.7-3.7-13.6-9.1l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>';
const _sbAuth=window.supabase.createClient(SUPA.url, SUPA.key);
function showGate(msg){
  let g=document.getElementById("auth-gate");
  if(!g){ g=document.createElement("div"); g.id="auth-gate"; document.body.appendChild(g); }
  g.innerHTML=`<div class="gc"><div class="gt">The Joneses</div><div class="gs">${msg||"Private relationship map.<br>Sign in to continue."}</div><button id="gate-google" class="gb">${_GOOGLE_SVG}<span>Continue with Google</span></button><div class="gf">Access is limited to authorised accounts.</div></div>`;
  g.style.display="flex";
  document.getElementById("gate-google").onclick=()=>_sbAuth.auth.signInWithOAuth({provider:"google",options:{redirectTo:location.origin+location.pathname}});
}
function hideGate(){ const g=document.getElementById("auth-gate"); if(g)g.style.display="none"; }
function addSignOut(email){
  let b=document.getElementById("signout-btn");
  if(!b){ b=document.createElement("button"); b.id="signout-btn"; document.body.appendChild(b); }
  b.textContent="⏻ "+email.split("@")[0]; b.title="Signed in as "+email+" — sign out";
  b.onclick=async()=>{ await _sbAuth.auth.signOut(); location.reload(); };
}
let _authBooted=false;
async function _gateApply(session){
  if(session && session.access_token){
    const email=(session.user.email||"").toLowerCase();
    if(!ALLOW.includes(email)){ await _sbAuth.auth.signOut(); AUTH_TOKEN=null; showGate("That account isn't authorised for The Joneses."); return; }
    AUTH_TOKEN=session.access_token;
    if(!_authBooted){ _authBooted=true; hideGate(); addSignOut(email); liveRefresh(); }
  } else { AUTH_TOKEN=null; if(!_authBooted) showGate(); }
}
_sbAuth.auth.onAuthStateChange((_e,s)=>_gateApply(s));
_sbAuth.auth.getSession().then(({data})=>_gateApply(data.session));
